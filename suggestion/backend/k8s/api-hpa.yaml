apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: finalthreecon-api
  namespace: finalthreecon
  labels:
    app: finalthreecon-api
    app.kubernetes.io/part-of: finalthreecon
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: finalthreecon-api
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
